<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400">
  <defs>
    <filter id="greenGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="yellowGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="redGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="yellowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF4444"/>
      <stop offset="100%" stop-color="#DC2626"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="#0A0E1A"/>

  <!-- Flow lines connecting zones -->
  <path d="M 360 200 Q 450 160 500 200" fill="none" stroke="#1E293B" stroke-width="2" stroke-dasharray="6 4"/>
  <path d="M 700 200 Q 750 240 840 200" fill="none" stroke="#1E293B" stroke-width="2" stroke-dasharray="6 4"/>

  <!-- Left arrow markers -->
  <polygon points="490,195 500,200 490,205" fill="#1E293B"/>
  <polygon points="830,195 840,200 830,205" fill="#1E293B"/>

  <!-- GREEN Zone Shield (left, largest) -->
  <path d="M 180 100 Q 180 80 200 80 L 320 80 Q 340 80 340 100 L 340 240 Q 340 300 260 320 Q 180 300 180 240 Z" 
        fill="url(#greenGrad)" opacity="0.15" stroke="#10B981" stroke-width="2" filter="url(#greenGlow)"/>
  <text x="260" y="140" text-anchor="middle" fill="#10B981" font-family="Inter, sans-serif" font-size="14" font-weight="600">GREEN ZONE</text>
  <text x="260" y="165" text-anchor="middle" fill="#94A3B8" font-family="Inter, sans-serif" font-size="12">Auto-Execute</text>
  <text x="260" y="240" text-anchor="middle" fill="#F1F5F9" font-family="JetBrains Mono, monospace" font-size="24" font-weight="500">23</text>
  <text x="260" y="262" text-anchor="middle" fill="#94A3B8" font-family="Inter, sans-serif" font-size="11">Workflows</text>

  <!-- YELLOW Zone Shield (center, medium) -->
  <path d="M 520 120 Q 520 100 540 100 L 660 100 Q 680 100 680 120 L 680 250 Q 680 290 600 310 Q 520 290 520 250 Z" 
        fill="url(#yellowGrad)" opacity="0.15" stroke="#F59E0B" stroke-width="2" filter="url(#yellowGlow)"/>
  <text x="600" y="155" text-anchor="middle" fill="#F59E0B" font-family="Inter, sans-serif" font-size="14" font-weight="600">YELLOW ZONE</text>
  <text x="600" y="180" text-anchor="middle" fill="#94A3B8" font-family="Inter, sans-serif" font-size="12">Human Approval</text>
  <text x="600" y="245" text-anchor="middle" fill="#F1F5F9" font-family="JetBrains Mono, monospace" font-size="24" font-weight="500">8</text>
  <text x="600" y="267" text-anchor="middle" fill="#94A3B8" font-family="Inter, sans-serif" font-size="11">Workflows</text>

  <!-- RED Zone Shield (right, smallest) -->
  <path d="M 860 140 Q 860 120 880 120 L 1000 120 Q 1020 120 1020 140 L 1020 260 Q 1020 280 940 295 Q 860 280 860 260 Z" 
        fill="url(#redGrad)" opacity="0.15" stroke="#EF4444" stroke-width="2" filter="url(#redGlow)"/>
  <text x="940" y="175" text-anchor="middle" fill="#EF4444" font-family="Inter, sans-serif" font-size="14" font-weight="600">RED ZONE</text>
  <text x="940" y="200" text-anchor="middle" fill="#94A3B8" font-family="Inter, sans-serif" font-size="12">Blocked by Default</text>
  <text x="940" y="255" text-anchor="middle" fill="#F1F5F9" font-family="JetBrains Mono, monospace" font-size="24" font-weight="500">0</text>
  <text x="940" y="277" text-anchor="middle" fill="#94A3B8" font-family="Inter, sans-serif" font-size="11">Access Attempts</text>

  <!-- Labels below -->
  <text x="260" y="365" text-anchor="middle" fill="#64748B" font-family="Inter, sans-serif" font-size="11">LOW RISK</text>
  <text x="600" y="365" text-anchor="middle" fill="#64748B" font-family="Inter, sans-serif" font-size="11">MEDIUM RISK</text>
  <text x="940" y="365" text-anchor="middle" fill="#64748B" font-family="Inter, sans-serif" font-size="11">HIGH RISK</text>
</svg>