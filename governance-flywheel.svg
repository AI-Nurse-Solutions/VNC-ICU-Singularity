<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <!-- Arrow marker -->
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1E293B"/>
    </marker>
    <!-- Glow filters -->
    <filter id="tealGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <circle cx="400" cy="400" r="380" fill="#111827" opacity="0.5"/>

  <!-- Outer ring -->
  <circle cx="400" cy="400" r="360" fill="none" stroke="#1E293B" stroke-width="1" opacity="0.6"/>
  <circle cx="400" cy="400" r="280" fill="none" stroke="#1E293B" stroke-width="1" opacity="0.4"/>

  <!-- Curved arrows connecting stages (clockwise) -->
  <!-- Top -> Top-right -->
  <path d="M 400 80 A 320 320 0 0 1 680 270" fill="none" stroke="#1E293B" stroke-width="2" marker-end="url(#arrowhead)"/>
  <!-- Top-right -> Bottom-right -->
  <path d="M 680 530 A 320 320 0 0 1 570 720" fill="none" stroke="#1E293B" stroke-width="2" marker-end="url(#arrowhead)"/>
  <!-- Bottom-right -> Bottom-left -->
  <path d="M 230 720 A 320 320 0 0 1 120 530" fill="none" stroke="#1E293B" stroke-width="2" marker-end="url(#arrowhead)"/>
  <!-- Bottom-left -> Top-left -->
  <path d="M 120 270 A 320 320 0 0 1 230 80" fill="none" stroke="#1E293B" stroke-width="2" marker-end="url(#arrowhead)"/>
  <!-- Top-left -> Top -->
  <path d="M 570 80 A 320 320 0 0 1 400 80" fill="none" stroke="#1E293B" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Stage 1: Top - Governed Workflows -->
  <circle cx="400" cy="120" r="12" fill="#0D9488" filter="url(#tealGlow)"/>
  <text x="400" y="100" text-anchor="middle" fill="#F1F5F9" font-family="Inter, sans-serif" font-size="16" font-weight="600">Governed Workflows</text>
  <text x="400" y="155" text-anchor="middle" fill="#94A3B8" font-family="Inter, sans-serif" font-size="12">AI-assisted tasks with</text>
  <text x="400" y="172" text-anchor="middle" fill="#94A3B8" font-family="Inter, sans-serif" font-size="12">proper oversight</text>

  <!-- Stage 2: Top-right - Trust Expands -->
  <circle cx="680" cy="400" r="12" fill="#10B981" filter="url(#tealGlow)"/>
  <text x="680" y="375" text-anchor="middle" fill="#F1F5F9" font-family="Inter, sans-serif" font-size="16" font-weight="600">Trust Expands</text>
  <text x="680" y="430" text-anchor="middle" fill="#94A3B8" font-family="Inter, sans-serif" font-size="12">Nurses and staff gain</text>
  <text x="680" y="447" text-anchor="middle" fill="#94A3B8" font-family="Inter, sans-serif" font-size="12">confidence</text>

  <!-- Stage 3: Bottom-right - Scope Expands -->
  <circle cx="540" cy="680" r="12" fill="#06B6D4" filter="url(#tealGlow)"/>
  <text x="540" y="660" text-anchor="middle" fill="#F1F5F9" font-family="Inter, sans-serif" font-size="16" font-weight="600">Scope Expands</text>
  <text x="540" y="715" text-anchor="middle" fill="#94A3B8" font-family="Inter, sans-serif" font-size="12">More workflows enter</text>
  <text x="540" y="732" text-anchor="middle" fill="#94A3B8" font-family="Inter, sans-serif" font-size="12">the system</text>

  <!-- Stage 4: Bottom-left - More Stewards Trained -->
  <circle cx="260" cy="680" r="12" fill="#3B82F6" filter="url(#tealGlow)"/>
  <text x="260" y="660" text-anchor="middle" fill="#F1F5F9" font-family="Inter, sans-serif" font-size="16" font-weight="600">More Stewards Trained</text>
  <text x="260" y="715" text-anchor="middle" fill="#94A3B8" font-family="Inter, sans-serif" font-size="12">Clinical ladder nurses</text>
  <text x="260" y="732" text-anchor="middle" fill="#94A3B8" font-family="Inter, sans-serif" font-size="12">become AI stewards</text>

  <!-- Stage 5: Top-left - More Workflows Governed -->
  <circle cx="120" cy="400" r="12" fill="#0D9488" filter="url(#tealGlow)"/>
  <text x="120" y="375" text-anchor="middle" fill="#F1F5F9" font-family="Inter, sans-serif" font-size="16" font-weight="600">More Workflows Governed</text>
  <text x="120" y="430" text-anchor="middle" fill="#94A3B8" font-family="Inter, sans-serif" font-size="12">Cycle reinforces</text>
  <text x="120" y="447" text-anchor="middle" fill="#94A3B8" font-family="Inter, sans-serif" font-size="12">itself</text>

  <!-- Center label -->
  <circle cx="400" cy="400" r="80" fill="#0A0E1A" stroke="#1E293B" stroke-width="1"/>
  <text x="400" y="395" text-anchor="middle" fill="#0D9488" font-family="Inter, sans-serif" font-size="14" font-weight="600">GOVERNANCE</text>
  <text x="400" y="415" text-anchor="middle" fill="#94A3B8" font-family="Inter, sans-serif" font-size="11">FLYWHEEL</text>
</svg>