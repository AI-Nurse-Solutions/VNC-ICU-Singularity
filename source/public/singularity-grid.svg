<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1E293B" stroke-width="0.5" opacity="0.5"/>
    </pattern>
  </defs>
  <rect width="1920" height="1080" fill="#0A0E1A"/>
  <rect width="1920" height="1080" fill="url(#grid)"/>
  <!-- Subtle cross lines -->
  <line x1="960" y1="0" x2="960" y2="1080" stroke="#1E293B" stroke-width="0.5" opacity="0.3"/>
  <line x1="0" y1="540" x2="1920" y2="540" stroke="#1E293B" stroke-width="0.5" opacity="0.3"/>
  <!-- Subtle radial vignette -->
  <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
    <stop offset="0%" stop-color="#0A0E1A" stop-opacity="0"/>
    <stop offset="100%" stop-color="#0A0E1A" stop-opacity="0.8"/>
  </radialGradient>
  <rect width="1920" height="1080" fill="url(#vignette)"/>
</svg>